services:
  db:
    image: postgres:15-alpine
    container_name: staff_db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: staff_db

    # Тюнинг под ~2к пользователей.
    #   max_connections=200 — чтобы 4 воркера × 25 соединений + запас на
    #     psql/migrations/backups укладывались без "too many clients".
    #   shared_buffers=256MB — кеш страниц Postgres (≈25% памяти контейнера).
    #   effective_cache_size=1GB — подсказка планировщику.
    #   work_mem=8MB — сортировки/хеш-джойны в памяти без temp-файлов.
    # Значения рассчитаны на 2-4 GB RAM контейнера. Поднимите пропорционально.
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d staff_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  web:
    build: .
    container_name: staff_web
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      # Vault-конфиг: приоритет — переменные из .env (если заданы),
      # иначе те же дефолты, что и в самом vault-сервисе ниже.
      # Это держит web и vault согласованными: оба видят один и тот же
      # токен, и pods2 может подключиться к Vault без правок .env.
      VAULT_URL:   "${VAULT_URL:-http://vault:8200}"
      VAULT_TOKEN: "${VAULT_TOKEN:-pods2-dev-root-token}"

    depends_on:
      db:
        condition: service_healthy
      vault:
        # service_started (а НЕ service_healthy) — web стартует сразу после
        # старта контейнера Vault, без ожидания healthcheck. Причина: Vault
        # в dev-режиме нужно несколько секунд на init+unseal, и blocking
        # service_healthy ронял весь deploy если healthcheck не успевал
        # подтвердиться за retries × interval. Наш CryptoStorage всё равно
        # делает lazy-init при первом обращении, так что web корректно
        # стартует пока Vault ещё доходит до готовности.
        condition: service_started

    # Количество воркеров: ~(2 × CPU + 1), но ограничено пулом БД.
    # При 4 воркерах и pool_size=10+max_overflow=15 пик = 100 соединений
    # (= стоковый postgres max_connections). Для бОльшего scale добавьте
    # pgbouncer и увеличьте GUNICORN_WORKERS в .env.
    # --timeout 60 — убиваем воркер только после минуты (защита от зависших),
    # --graceful-timeout 30 — даём 30с на завершение текущих запросов,
    # --access-logfile - — access log в stdout для docker logs.
    # --forwarded-allow-ips: критично за обратным прокси (Nginx / NPM /
    # Cloudflare Tunnel). Без него FastAPI не доверяет X-Forwarded-For/Proto
    # и:
    #   • rate-limiter считает всех клиентов одним IP контейнера прокси;
    #   • request.url отдаёт http:// → ссылки в QR/PDF получаются http;
    #   • request.client.host = IP прокси, а не реального клиента.
    # '*' = доверяем всем источникам — сервер всё равно слушает только
    # на внутренней Docker-сети, снаружи доступа нет.
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w ${GUNICORN_WORKERS:-4}
      -b 0.0.0.0:8000
      --forwarded-allow-ips '*'
      --timeout 60
      --graceful-timeout 30
      --access-logfile -
      --error-logfile -

    volumes:
      - .:/code   # ← оставь для dev, убери для production
      - seddata:/data/sed_files   # кеш файлов СЭД (BLOB'ы по 20МБ макс)
      - cryptokeys:/data/crypto_keys   # fallback-хранилище для dev (если VAULT_URL пуст)

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - backend

  # ─── HashiCorp Vault: хранилище ключей и сертификатов КриптоПро ──────────
  # Используется модулем crypto-keys (app/services/vault_client.py). Контейнеры
  # КриптоПро (папки xxx.000) и .cer сертификаты складываются сюда в KV-engine v2
  # с шифрованием на стороне Vault. В БД pods2 лежат только метаданные.
  #
  # ВАЖНО для прода: запуск с -dev НЕБЕЗОПАСЕН — данные в памяти, root-token
  # фиксированный, нет sealed-режима. Для production нужно:
  #   1) убрать секцию command (или сделать `vault server -config=/vault/config/...`),
  #   2) смонтировать конфиг file/raft storage backend,
  #   3) при первом запуске сделать `vault operator init` и сохранить unseal keys.
  # До перехода в прод dev-режим достаточен и удобен (без ручного unseal).
  vault:
    image: hashicorp/vault:1.18
    container_name: staff_vault
    restart: always

    cap_add:
      # mlock не даёт ОС свопнуть память с секретами на диск.
      - IPC_LOCK

    # Явная команда `server -dev` гарантированно поднимает dev-режим.
    # В новых hashicorp/vault-образах одних env-переменных может не хватать
    # (поведение менялось между версиями) — командной строкой надёжнее.
    command: ["vault", "server", "-dev"]

    environment:
      # Dev-режим: единый root-token, эталонный для PODS2 в .env.
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-pods2-dev-root-token}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      # VAULT_ADDR — для возможного `docker exec staff_vault vault ...`.
      # Healthcheck его не использует (через wget идём напрямую на http).
      VAULT_ADDR: "http://127.0.0.1:8200"

    # В dev-mode Vault держит данные в памяти — volume не используется.
    # Оставляем без mount, чтобы образ не пытался писать в /vault/file
    # (может приводить к permission-issues при downgrade hashicorp/vault).

    healthcheck:
      # wget есть в hashicorp/vault image (busybox-based). Параметры
      # ?sealedcode=200&uninitcode=200 заставляют /sys/health всегда отвечать
      # HTTP 200 — нам в healthcheck важно лишь "Vault слушает порт и отвечает
      # на /sys/health", а реальное состояние (sealed/active) проверит наш
      # _VaultBackend на стороне приложения через hvac.is_authenticated().
      test:        ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?sealedcode=200&uninitcode=200&standbyok=true"]
      interval:    10s
      timeout:     5s
      retries:     5
      start_period: 10s

    networks:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: staff_nginx
    restart: always

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      web:
        condition: service_healthy

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./static:/code/static:ro

    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  seddata:
  cryptokeys:   # fallback-хранилище для dev (если Vault недоступен)
  vaultdata:    # данные Vault (KV v2, метаданные, аудит-логи)
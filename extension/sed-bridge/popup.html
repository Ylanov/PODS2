<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>СЭД-мост pods2</title>
    <style>
        body {
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 12px 14px;
            width: 280px;
            font-size: 13px;
            color: #1c1a18;
        }
        h1 {
            font-size: 14px;
            margin: 0 0 8px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-top: 1px solid #eee;
        }
        .row:first-of-type { border-top: none; }
        .row__label { color: #707070; font-size: 12px; }
        .row__value { font-weight: 500; }
        .status {
            margin: 8px 0;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.4;
            background: #f5f4f2;
        }
        .status--ok       { background: #e8f5ee; color: #2f7d4a; }
        .status--err      { background: #fdf0f0; color: #b85450; }
        .status--auth,
        .status--auth_pods2,
        .status--config   { background: #fef6e8; color: #8a5b1a; }
        .actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        button {
            flex: 1;
            border: 1px solid #d5d2cc;
            background: #fff;
            color: #1c1a18;
            border-radius: 5px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background: #f5f4f2; }
        .btn-primary {
            background: #4a7c6f; color: #fff; border-color: #3a6358;
        }
        .btn-primary:hover { background: #3a6358; }
        .btn-warn {
            background: #c97b2e; color: #fff; border-color: #a85f1a;
        }
        .btn-warn:hover { background: #a85f1a; }
    </style>
</head>
<body>

<h1>📬 СЭД-мост pods2</h1>

<div id="status" class="status">Загрузка…</div>

<div class="row">
    <span class="row__label">Всего непрочитанных</span>
    <span class="row__value" id="total">—</span>
</div>
<div class="row">
    <span class="row__label">Последняя синхронизация</span>
    <span class="row__value" id="last">—</span>
</div>

<div class="actions">
    <button class="btn-primary" id="sync-btn">Синхр. сейчас</button>
    <button id="opts-btn">Настройки</button>
</div>
<div class="actions">
    <button id="pause-btn" title="Останавливает все фоновые запросы к СЭД">⏸ Пауза</button>
</div>

<script src="popup.js" type="module"></script>
</body>
</html>
